name: Bug report
description: Report a defect in the PolyMessaging iOS SDK
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The more concrete information you give us, the faster we can act on it.

  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      description: The PolyMessaging iOS SDK version you're using (see `PolyMessaging.version` or `Sources/PolyMessaging/Public/Version.swift`).
      placeholder: "0.4.0"
    validations:
      required: true

  - type: input
    id: xcode-version
    attributes:
      label: Xcode version
      placeholder: "15.4"
    validations:
      required: true

  - type: input
    id: ios-version
    attributes:
      label: iOS / Simulator version
      placeholder: "iOS 17.5 on iPhone 15 Simulator"
    validations:
      required: true

  - type: dropdown
    id: integration-style
    attributes:
      label: Integration style
      options:
        - SwiftUI
        - UIKit
        - Both
        - Not sure / other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you observe? Include any error messages or `PolyError` cases verbatim.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal recipe. If you can reproduce against one of the example apps in `Examples/`, please name it.
      placeholder: |
        1. Run `Examples/SwiftUI/02-Standard`
        2. Tap …
        3. Observe …
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Console output, especially from `PolyMessaging` log statements. **Redact API keys.**
      render: shell
