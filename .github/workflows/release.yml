name: Release

# Tag-on-merge: when the SDK version on main changes (and no tag exists yet),
# create the tag + GitHub Release. The canonical version is the User-Agent string
# in RestApi.swift (the SKILL's source of truth that must move on every release).
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read version from RestApi.swift
        id: ver
        run: |
          v=$(grep -oE 'PolyMessaging-iOS/[0-9]+\.[0-9]+\.[0-9]+' \
                Sources/PolyMessaging/Internal/Adapters/RestApi.swift | head -1 | sed 's#PolyMessaging-iOS/##')
          if [ -z "$v" ]; then echo "could not read version" >&2; exit 1; fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Tag + release if new
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          v="${{ steps.ver.outputs.version }}"
          if git rev-parse "$v" >/dev/null 2>&1 || gh release view "$v" >/dev/null 2>&1; then
            echo "Tag/release $v already exists — nothing to do."
            exit 0
          fi
          notes=$(awk "/^## \\[$v\\]/{f=1;next} /^## \\[/{f=0} f" CHANGELOG.md)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$v" -m "PolyMessaging iOS SDK $v"
          git push origin "$v"
          gh release create "$v" --title "$v" --notes "${notes:-Release $v}"
