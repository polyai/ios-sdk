name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Cancel superseded runs only for PRs; let every push to main run to completion
  # (so each merged commit is verified and reruns don't cancel each other).
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title follows conventional commits
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|docs|chore|test|refactor|style|ci|build|perf)(\(.+\))?!?: .+'
          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "::error::PR title does not follow conventional commits format."
            echo "Expected: <type>[optional scope][!]: <description>"
            echo "See CONTRIBUTING.md for details."
            exit 1
          fi

  build-test:
    name: build-test
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Select stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test
