name: FullReferenceUIKit
options:
  bundleIdPrefix: ai.poly.examples
  deploymentTarget:
    iOS: "15.0"
packages:
  PolyMessaging:
    path: ../../..
targets:
  FullReferenceUIKit:
    type: application
    platform: iOS
    sources:
      - path: .
        name: FullReferenceUIKit
        excludes:
          - project.yml
          - "*.xcodeproj"
          - Generated
          - UITests
          - .DS_Store
    dependencies:
      - package: PolyMessaging
    info:
      path: Generated/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: "Default Configuration"
                UISceneDelegateClassName: "$(PRODUCT_MODULE_NAME).SceneDelegate"
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "5.9"
  FullReferenceUIKitUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: FullReferenceUIKit
    settings:
      base:
        SWIFT_VERSION: "5.9"
        TEST_TARGET_NAME: FullReferenceUIKit
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: ai.poly.examples.FullReferenceUIKitUITests
schemes:
  FullReferenceUIKit:
    build:
      targets:
        FullReferenceUIKit: all
        FullReferenceUIKitUITests: [test]
    test:
      targets:
        - FullReferenceUIKitUITests
